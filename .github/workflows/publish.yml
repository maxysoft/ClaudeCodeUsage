# Auto-tag on main push, then build + package on v* tag.
#
# Flow:
#   push to main
#     → "tag" job reads package.json version, creates v<version> tag if absent
#     → tag push triggers "build" job
#   build job:
#     1. Verifies tag matches package.json version.
#     2. Compiles TypeScript, packages versioned .vsix.
#     3. Uploads .vsix as build artifact (30 days).
#     4. Attaches .vsix to GitHub Release with auto-generated notes.
#
# Manual trigger: Actions → Package Extension → Run workflow
#   (skips the tag step; builds from whatever ref is selected).

name: Package Extension

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Auto-tag ────────────────────────────────────────────────────────────────
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag from package.json version
        run: |
          VER=$(node -p "require('./package.json').version")
          TAG="v${VER}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed ${TAG}"
          fi

  # ── Build & package ─────────────────────────────────────────────────────────
  build:
    name: Build and package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VER=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag v$TAG does not match package.json version $VER"
            exit 1
          fi
          echo "OK: tag v$TAG matches package.json $VER"

      - name: Compile
        run: npm run compile

      - name: Resolve version
        id: ver
        run: echo "vsix=claude-code-usage-$(node -p "require('./package.json').version").vsix" >> $GITHUB_OUTPUT

      - name: Package .vsix
        run: npx -y @vscode/vsce package --no-dependencies --out "${{ steps.ver.outputs.vsix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.vsix }}
          path: ${{ steps.ver.outputs.vsix }}
          retention-days: 30

      - name: Attach .vsix to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ver.outputs.vsix }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
