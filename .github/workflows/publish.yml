# Build and package on `v*` tag push or manual trigger.
#
# What this does:
#   1. Checks out the tagged commit.
#   2. Verifies the tag matches package.json's version.
#   3. Compiles TypeScript, packages a versioned .vsix.
#   4. Uploads the .vsix as a build artifact.
#   5. Attaches the .vsix to the GitHub Release for that tag,
#      auto-generating release notes from PRs merged since the previous release.
#
# Usage:
#   git tag v2.2.0 && git push origin v2.2.0
#   ↳ this workflow then runs end to end.
#
# Or trigger manually from Actions → Package Extension → Run workflow.

name: Package Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release to create / attach assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Refuse to proceed if the tag doesn't match the version in package.json.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VER=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag v$TAG does not match package.json version $VER"
            exit 1
          fi
          echo "OK: tag v$TAG matches package.json $VER"

      - name: Compile
        run: npm run compile

      - name: Resolve version
        id: ver
        run: echo "vsix=claude-code-usage-$(node -p "require('./package.json').version").vsix" >> $GITHUB_OUTPUT

      - name: Package .vsix
        run: npx -y @vscode/vsce package --no-dependencies --out "${{ steps.ver.outputs.vsix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.vsix }}
          path: ${{ steps.ver.outputs.vsix }}
          retention-days: 30

      - name: Attach .vsix to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ver.outputs.vsix }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
